name: Build Windows Executable

on:
  push:
    branches: [ main, master, feature/** ]
  workflow_dispatch:  # permite disparar manualmente pelo GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --ignore-requires-python
          Write-Host "--- Instalando pacotes criticos explicitamente ---"
          pip install PyQt5==5.15.11 numpy==1.26.4 pandas==2.3.3
          pip install psycopg2-binary oracledb cryptography==41.0.7 bcrypt passlib==1.7.4
          pip install APScheduler platformdirs firebirdsql
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Verificar pacotes instalados
        run: |
          python -c "import PyQt5; print('PyQt5:', PyQt5.__version__)"
          python -c "import numpy; print('numpy:', numpy.__version__)"
          python -c "import pandas; print('pandas:', pandas.__version__)"
          python -c "import sysconfig; print('site-packages:', sysconfig.get_paths()['purelib'])"
          pip show PyQt5 | Select-String "Location"

      - name: Compilar executável (PyInstaller)
        run: |
          pyinstaller build.spec --clean --noconfirm

      - name: Verificar build
        run: |
          if (Test-Path "dist\OrionTaxSync\OrionTaxSync.exe") {
            Write-Host "Executavel gerado com sucesso"
            Get-Item "dist\OrionTaxSync\OrionTaxSync.exe" | Select-Object Name, Length
          } else {
            Write-Host "ERRO: Executavel nao encontrado"
            exit 1
          }
          Write-Host "--- Tamanho total da pasta dist ---"
          $size = (Get-ChildItem -Recurse "dist\OrionTaxSync" | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host ("Total: {0:N1} MB" -f $size)
          Write-Host "--- Verificando presenca de PyQt5 e numpy ---"
          if (Test-Path "dist\OrionTaxSync\_internal\PyQt5") { Write-Host "PyQt5 PRESENTE" } else { Write-Host "PyQt5 AUSENTE" }
          if (Test-Path "dist\OrionTaxSync\_internal\numpy") { Write-Host "numpy PRESENTE" } else { Write-Host "numpy AUSENTE" }
          if (Test-Path "dist\OrionTaxSync\_internal\pandas") { Write-Host "pandas PRESENTE" } else { Write-Host "pandas AUSENTE" }
          Write-Host "--- Conteudo _internal ---"
          Get-ChildItem "dist\OrionTaxSync\_internal" | Select-Object Name, @{N='KB';E={[math]::Round($_.Length/1KB,1)}}

      - name: Criar ZIP de distribuição
        run: |
          New-Item -ItemType Directory -Force -Path installer_output
          Compress-Archive -Path "dist\OrionTaxSync\*" -DestinationPath "installer_output\OrionTaxSync.zip" -Force
          Write-Host "✓ ZIP criado"
          Get-Item "installer_output\OrionTaxSync.zip" | Select-Object Name, @{N='Tamanho';E={"{0:N2} MB" -f ($_.Length / 1MB)}}

      - name: Upload ZIP como artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionTaxSync-Windows
          path: installer_output\OrionTaxSync.zip
          retention-days: 30
